<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <title>Document</title>
    </head>
    <body>
        <header class="navbar">
            <!-- Include reset button and also show score 
         Potentially can include a timer here-->
            <a href="index.html">
                <img src="icons/homeIcon.png" alt="Reset Quiz" />
            </a>

            <!-- eventually will turn into changable elements -->
            <div class="navbar_score">0/0</div>
        </header>

        <main class="quiz">
            <!-- include question(include photo, 4 answers etc) -->
            <div class="quiz_box">
                <div class="quiz_question">
                    <!-- image+text will need to be updated with each question -->
                    <img src="icons/question1.png" alt="Question Image" />
                    <h2>What is the capital city of Japan?</h2>
                </div>
                <div class="quiz_answers">
                    <button class="quiz_answer">Answer A</button>
                    <button class="quiz_answer">Answer B</button>
                    <button class="quiz_answer">Tokyo</button>
                    <button class="quiz_answer">Answer D</button>
                </div>
            </div>
        </main>

        <footer class="proceed">
            <!-- include a link to the next question, 
         can also put timer here -->
         <span class="proceed_timer">15 seconds left</span> 
         <button class="proceed_nextQ">Next Question</button>
        </footer>

        <script src="index.js"></script>
    </body>
</html>
